name: Publish x86 image

on:
  push:
    branches: [main]
    paths:
      - 'x86/**'
      - '!x86/README.md'
      - '!x86/*.docx'
      - '.github/workflows/publish-x86.yml'
  workflow_dispatch:

# If a newer push lands while an older build is still running, cancel the old
# one so an outdated image can never overwrite a newer :latest.
concurrency:
  group: publish-x86
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date tag
        id: date
        run: echo "tag=$(date -u +%Y.%m)" >> "$GITHUB_OUTPUT"

      # provenance/sbom stay off so the manifest remains a plain single-arch
      # image — a manifest list here breaks flagless pulls on Apple Silicon
      # (see AGENTS.md and scripts/release-check.sh)
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: x86
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: |
            seancnc/unlv-x86-ide:latest
            seancnc/unlv-x86-ide:${{ steps.date.outputs.tag }}
          cache-from: type=gha,scope=x86
          cache-to: type=gha,scope=x86,mode=max
