name: Publish cpp image

on:
  push:
    branches: [main]
    paths:
      - 'cpp/**'
      - '!cpp/README.md'
      - '!cpp/*.docx'
      - '.github/workflows/publish-cpp.yml'
  workflow_dispatch:

# If a newer push lands while an older build is still running, cancel the old
# one so an outdated image can never overwrite a newer :latest.
concurrency:
  group: publish-cpp
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU provides the arm64 half of the multi-arch build on amd64 runners
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date tag
        id: date
        run: echo "tag=$(date -u +%Y.%m)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: cpp
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            seancnc/unlv-cpp-ide:latest
            seancnc/unlv-cpp-ide:${{ steps.date.outputs.tag }}
          cache-from: type=gha,scope=cpp
          cache-to: type=gha,scope=cpp,mode=max
