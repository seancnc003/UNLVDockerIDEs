name: Publish cpp image

on:
  push:
    branches: [main]
    paths:
      - 'cpp/**'
      - '!cpp/README.md'
      - '!cpp/*.docx'
      - '.github/workflows/publish-cpp.yml'
  workflow_dispatch:

# If a newer push lands while an older build is still running, cancel the old
# one so an outdated image can never overwrite a newer :latest.
concurrency:
  group: publish-cpp
  cancel-in-progress: true

# Each arch builds natively on its own runner (no QEMU — emulated arm64 builds
# segfault in glibc's post-install), pushed by digest only. The merge job then
# stitches the digests into one multi-arch manifest tagged :latest + :YYYY.MM.
jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Platform slug
        id: plat
        run: echo "slug=$(echo '${{ matrix.platform }}' | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: cpp
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=seancnc/unlv-cpp-ide,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=cpp-${{ steps.plat.outputs.slug }}
          cache-to: type=gha,scope=cpp-${{ steps.plat.outputs.slug }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ steps.plat.outputs.slug }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute date tag
        id: date
        run: echo "tag=$(date -u +%Y.%m)" >> "$GITHUB_OUTPUT"

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t seancnc/unlv-cpp-ide:latest \
            -t seancnc/unlv-cpp-ide:${{ steps.date.outputs.tag }} \
            $(printf 'seancnc/unlv-cpp-ide@sha256:%s ' *)

      - name: Inspect result
        run: docker buildx imagetools inspect seancnc/unlv-cpp-ide:latest
